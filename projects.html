<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  HOW TO ADD / EDIT PROJECTS                                  ║
  ║  ──────────────────────────────────────────────────────────  ║
  ║  Open js/projects.js and edit the `projects` array.          ║
  ║  Each project is an object with these fields:                ║
  ║                                                              ║
  ║    title       — Project name                                ║
  ║    subtitle    — Short tagline                               ║
  ║    description — Full description (HTML supported)           ║
  ║    tags        — Array of technology strings                 ║
  ║    images      — Array of image paths (images/projects/)     ║
  ║    liveUrl     — Link to live demo (or "")                   ║
  ║    githubUrl   — GitHub link (or "")                         ║
  ║    extraLinks  — [{label, url}] for any other links          ║
  ╚══════════════════════════════════════════════════════════════╝
  -->
  <title>Projects — Maxwell Rosen</title>
  <meta property="og:type"  content="website">
  <meta property="og:url"   content="https://maximizizer.github.io/maxwellrosen/projects.html">
  <meta property="og:title" content="Maxwell Rosen">
  <meta property="og:image" content="https://maximizizer.github.io/maxwellrosen/images/photos/headshot.jpg">
  <meta name="twitter:card"  content="summary_large_image">
  <meta name="twitter:title" content="Maxwell Rosen">
  <meta name="twitter:image" content="https://maximizizer.github.io/maxwellrosen/images/photos/headshot.jpg">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .projects-hero {
      padding: 64px 0 56px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 56px;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .projects-count {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .no-results {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-muted);
      grid-column: 1/-1;
    }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────────── -->
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">Maxwell Rosen</a><!-- ← CHANGE THIS -->
    <div class="nav-links">
      <a href="index.html">About</a>
      <a href="professional.html">Professional</a>
      <a href="projects.html">Projects</a>
    </div>
    <button class="nav-hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="nav-drawer" id="nav-drawer">
  <a href="index.html">About</a>
  <a href="professional.html">Professional</a>
  <a href="projects.html">Projects</a>
</div>

<!-- ── Main ──────────────────────────────────────────────────── -->
<main>
  <div class="page">

    <!-- Hero -->
    <section class="projects-hero">
      <p class="section-label">Portfolio</p>
      <h1 class="page-title">Projects</h1>
      <p class="page-subtitle">
        A collection of things I've built. Click any card to see details,
        links, and photos.
        <!-- ↑ OPTIONALLY EDIT ↑ -->
      </p>
    </section>

    <!-- Filter bar — tags are auto-generated from projects.js -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" onclick="filterProjects('all', this)">All</button>
      <!-- More filter buttons are added dynamically by projects.js -->
    </div>

    <p class="projects-count" id="projects-count"></p>

    <!-- Project cards are rendered by js/projects.js -->
    <div class="projects-grid" id="projects-grid">
      <div style="padding:60px;text-align:center;color:var(--text-muted);grid-column:1/-1">
        Loading projects…
      </div>
    </div>

  </div><!-- /page -->
</main>

<!-- ── Project Detail Modal ───────────────────────────────── -->
<div class="modal-overlay" id="project-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal" id="project-modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
        <div class="tags" id="modal-tags" style="margin-top:10px;"></div>
      </div>
      <button class="modal-close" onclick="closeProjectModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-links" id="modal-links"></div>
      <div id="modal-gallery"></div>
    </div>
  </div>
</div>

<!-- ── Lightbox ─────────────────────────────────────────────── -->
<div class="lightbox" id="lightbox" role="dialog" aria-label="Image viewer">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
  <img id="lightbox-img" src="" alt="Full size image">
</div>

<!-- ── Footer ──────────────────────────────────────────────── -->
<footer class="footer">
  <p>© <span id="year"></span> Maxwell Rosen</p>
  <div style="display:flex;justify-content:center;gap:20px;margin-top:10px;">
    <a href="mailto:m2rosen@ucsd.edu" style="color:var(--text-light);font-size:0.85rem;">m2rosen@ucsd.edu</a>
    <a href="https://www.linkedin.com/in/maxwell-rosen-242777299/" target="_blank" rel="noopener" style="color:var(--text-light);font-size:0.85rem;">LinkedIn</a>
    <a href="https://github.com/Maximizizer" target="_blank" rel="noopener" style="color:var(--text-light);font-size:0.85rem;">GitHub</a>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  /* ── Filter logic ────────────────────────────────────────── */
  let activeFilter = 'all';

  function buildFilterBar() {
    const bar = document.getElementById('filter-bar');
    const allTags = [...new Set(projects.flatMap(p => p.tags))].sort();
    allTags.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = tag;
      btn.onclick = () => filterProjects(tag, btn);
      bar.appendChild(btn);
    });
  }

  function filterProjects(tag, btn) {
    activeFilter = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const cards = document.querySelectorAll('.project-card');
    let visible = 0;

    cards.forEach((card, i) => {
      const p = projects[i];
      const show = tag === 'all' || p.tags.includes(tag);
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    });

    const count = document.getElementById('projects-count');
    count.textContent = visible === projects.length
      ? `${projects.length} project${projects.length !== 1 ? 's' : ''}`
      : `${visible} of ${projects.length} projects`;
  }

  /* Override renderProjects to also build filter bar + count */
  document.addEventListener('DOMContentLoaded', () => {
    buildFilterBar();
    const count = document.getElementById('projects-count');
    count.textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''}`;
  });
</script>
<script src="js/projects.js"></script>
<script src="js/main.js"></script>
</body>
</html>
